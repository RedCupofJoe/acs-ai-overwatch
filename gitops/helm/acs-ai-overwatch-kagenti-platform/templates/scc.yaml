{{- if .Values.job.enabled }}
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: {{ .Release.Name }}-kagenti-platform-install
  {{- include "kagenti-platform.argocdSyncWaveAnnotations" (dict "root" . "wave" "rbac") | nindent 2 }}
  labels:
    {{- include "kagenti-platform.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/description: >-
      PoC-only SCC so the Kagenti platform install Job init container can run microdnf as root.
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: true
allowPrivilegedContainer: false
allowedCapabilities: []
defaultAddCapabilities: []
fsGroup:
  type: RunAsAny
priority: null
readOnlyRootFilesystem: false
requiredDropCapabilities:
  - KILL
  - MCH
  - SETUID
  - SETGID
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
users:
  - system:serviceaccount:{{ .Values.namespace }}:kagenti-platform-install
volumes:
  - configMap
  - emptyDir
  - projected
  - secret
  - downwardAPI
{{- end }}
