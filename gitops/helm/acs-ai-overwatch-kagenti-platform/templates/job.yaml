{{- if .Values.job.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: kagenti-platform-install
  {{- include "kagenti-platform.argocdSyncWaveAnnotations" (dict "root" . "wave" "job") | nindent 2 }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kagenti-platform.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-options: Timeout={{ .Values.argocd.hookTimeoutSeconds }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.argocd.hookTimeoutSeconds }}
  template:
    metadata:
      labels:
        {{- include "kagenti-platform.labels" . | nindent 8 }}
    spec:
      serviceAccountName: kagenti-platform-install
      restartPolicy: {{ .Values.job.restartPolicy }}
      initContainers:
        - name: oc
          image: {{ .Values.job.image | quote }}
          command:
            - cp
            - /usr/bin/oc
            - /tools/oc
          volumeMounts:
            - name: tools
              mountPath: /tools
        - name: helm
          image: {{ .Values.job.toolsInitImage | quote }}
          command:
            - bash
            - -ec
            - |
              arch="$(uname -m)"
              case "${arch}" in
                x86_64|amd64) helm_arch="amd64" ;;
                aarch64|arm64) helm_arch="arm64" ;;
                *) echo "unsupported architecture: ${arch}" >&2; exit 1 ;;
              esac
              curl -fsSL "https://get.helm.sh/helm-v{{ .Values.job.helmVersion }}-linux-${helm_arch}.tar.gz" \
                | tar xz -C /tmp
              mv "/tmp/linux-${helm_arch}/helm" /tools/helm
              chmod +x /tools/helm
              /tools/helm version --short
          volumeMounts:
            - name: tools
              mountPath: /tools
      containers:
        - name: install
          image: {{ .Values.job.toolsInitImage | quote }}
          env:
            - name: PATH
              value: /tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: KAGENTI_GIT_URL
              value: {{ .Values.kagenti.gitUrl | quote }}
            - name: KAGENTI_GIT_REF
              value: {{ .Values.kagenti.gitRef | quote }}
            - name: KAGENTI_NS
              value: {{ .Values.namespace | quote }}
            - name: KEYCLOAK_NAMESPACE
              value: {{ .Values.kagenti.keycloakNamespace | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.kagenti.keycloakRealm | quote }}
            - name: SKIP_MLFLOW
              value: {{ .Values.kagenti.skipMlflow | quote }}
            - name: SKIP_OVN_PATCH
              value: {{ .Values.kagenti.skipOvnPatch | quote }}
            - name: SKIP_UI
              value: {{ .Values.kagenti.skipUi | quote }}
            - name: AGENT_NAMESPACES
              value: {{ join "," .Values.kagenti.agentNamespaces | quote }}
            - name: EXTERNAL_OTEL_COLLECTOR
              value: {{ .Values.phase5.integration.externalOtelCollector | quote }}
            - name: PHASE5_INTEGRATION
              value: {{ .Values.phase5.integration.enabled | quote }}
          command:
            - /bin/bash
            - /scripts/install-kagenti-poc.sh
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: tools
              mountPath: /tools
      volumes:
        - name: scripts
          configMap:
            name: kagenti-platform-install-script
            defaultMode: 0555
        - name: tools
          emptyDir: {}
{{- end }}
