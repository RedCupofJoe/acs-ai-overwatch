global:
  partOf: acs-ai-overwatch

argocd:
  syncWaves:
    enabled: true
    # Namespace acs-ai-overwatch-system is created by acs-ai-overwatch-gitops-bootstrap.
    rbac: "0"
    configMap: "1"
    job: "2"

namespace: acs-ai-overwatch-system
configMapName: acs-ai-overwatch-cluster-config

job:
  enabled: true
  # Re-run discovery when the script ConfigMap changes.
  restartPolicy: OnFailure
  backoffLimit: 6
  image: registry.redhat.io/openshift4/ose-cli:latest
  gitRepoUrlDefault: https://github.com/RedCupofJoe/acs-ai-overwatch.git
