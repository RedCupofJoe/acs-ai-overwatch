apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-discovery-script
  {{- include "cluster-discovery.argocdSyncWaveAnnotations" (dict "root" . "wave" "configMap") | nindent 2 }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cluster-discovery.labels" . | nindent 4 }}
data:
  discover-in-cluster.sh: |
{{- $discover := .Files.Get "files/discover-in-cluster.sh" }}
{{- if not $discover }}{{- fail "chart files/discover-in-cluster.sh is missing or empty" }}{{- end }}
{{ $discover | nindent 4 }}
  openshift-cluster-discovery.sh: |
{{- $lib := .Files.Get "files/openshift-cluster-discovery.sh" }}
{{- if not $lib }}{{- fail "chart files/openshift-cluster-discovery.sh is missing or empty" }}{{- end }}
{{ $lib | nindent 4 }}
