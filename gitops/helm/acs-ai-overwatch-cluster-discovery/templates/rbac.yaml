apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-discovery
  {{- include "cluster-discovery.argocdSyncWaveAnnotations" (dict "root" . "wave" "rbac") | nindent 2 }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cluster-discovery.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-cluster-discovery
  {{- include "cluster-discovery.argocdSyncWaveAnnotations" (dict "root" . "wave" "rbac") | nindent 2 }}
  labels:
    {{- include "cluster-discovery.labels" . | nindent 4 }}
rules:
  - apiGroups: ["config.openshift.io"]
    resources: ["ingresses"]
    resourceNames: ["cluster"]
    verbs: ["get"]
  - apiGroups: ["config.openshift.io"]
    resources: ["infrastructures"]
    resourceNames: ["cluster"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-cluster-discovery
  {{- include "cluster-discovery.argocdSyncWaveAnnotations" (dict "root" . "wave" "rbac") | nindent 2 }}
  labels:
    {{- include "cluster-discovery.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-cluster-discovery
subjects:
  - kind: ServiceAccount
    name: cluster-discovery
    namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cluster-discovery-configmap
  {{- include "cluster-discovery.argocdSyncWaveAnnotations" (dict "root" . "wave" "rbac") | nindent 2 }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cluster-discovery.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-discovery-configmap
  {{- include "cluster-discovery.argocdSyncWaveAnnotations" (dict "root" . "wave" "rbac") | nindent 2 }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cluster-discovery.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cluster-discovery-configmap
subjects:
  - kind: ServiceAccount
    name: cluster-discovery
    namespace: {{ .Values.namespace }}
---
# Lets Argo CD repo-server (helm serverDryRun / lookup) read discovered cluster URLs.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-read-cluster-config
  {{- include "cluster-discovery.argocdSyncWaveAnnotations" (dict "root" . "wave" "rbac") | nindent 2 }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cluster-discovery.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: [{{ .Values.configMapName | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-read-cluster-config
  {{- include "cluster-discovery.argocdSyncWaveAnnotations" (dict "root" . "wave" "rbac") | nindent 2 }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cluster-discovery.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-read-cluster-config
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-repo-server
    namespace: openshift-gitops
