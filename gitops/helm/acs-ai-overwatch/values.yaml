# Cluster-specific configuration — override via Argo CD, CI, or:
#   helm upgrade -i acs-ai-overwatch . -f values-poc.yaml -n openshift-gitops
#
# Storage: all PVCs (including Quay) use gp3-csi (EBS) by default.
# Override storage.defaultStorageClass when your cluster differs (oc get sc).
# Discovery (discover-cluster-values.sh / cluster-discovery Job) writes defaultStorageClass
# and OLM operator channels to acs-ai-overwatch-cluster-config; Helm prefers those at render time.
# Alternative: external registry — set quayStorage.enabled false and point agent images elsewhere.

global:
  partOf: acs-ai-overwatch

# GitOps layout: bootstrap Application owns Namespace objects (managed-by label).
gitops:
  bootstrapNamespaces: true

# Skip rendering operator CRs until CRDs exist (Helm lookup). Stops Argo apply errors on first sync.
# Set waitForCrds: false only if lookup is unavailable on the repo-server and CRDs are already installed.
platformResources:
  waitForCrds: true
  crds:
    dataScienceCluster: datascienceclusters.datasciencecluster.opendatahub.io
    hardwareProfile: hardwareprofiles.infrastructure.opendatahub.io
    clusterPolicy: clusterpolicies.nvidia.com
    quayRegistry: quayregistries.quay.redhat.com
    central: centrals.platform.stackrox.io
    securedCluster: securedclusters.platform.stackrox.io
    securityPolicy: securitypolicies.config.stackrox.io

# Argo CD sync waves (lower number syncs first). See README "Argo CD Sync Waves".
argocd:
  syncWaves:
    enabled: true
    namespace: "0"
    operators: "10"
    storage: "20"
    platformCRs: "30"
    secrets: "40"
    pvcs: "45"
    configMaps: "50"
    security: "55"
    workloads: "60"
    bootstrap: "70"
    agents: "80"
    # Mattermost last — capstone before PoC execution (after platform, ACS, agents).
    mattermostPrep: "85"
    mattermostWorkloads: "90"
    mattermostBootstrap: "95"
    # ACS bootstrap upserts Mattermost Notifier from mattermost-acs-integration ConfigMap (wave 95).
    acsBootstrap: "96"
    # SecurityPolicy CRs reference Mattermost Notifier; apply after notifier exists in Central.
    acsPolicies: "97"

# In-cluster discovery Job writes acs-ai-overwatch-cluster-config (see helm/acs-ai-overwatch-cluster-discovery).
clusterDiscovery:
  enabled: true
  namespace: acs-ai-overwatch-system
  configMapName: acs-ai-overwatch-cluster-config
  discoveryApplicationName: acs-ai-overwatch-cluster-discovery

cluster:
  # Optional override. When empty, read from ConfigMap written by cluster-discovery Application.
  name: acs-ai-overwatch
  appsDomain: ""
  # Describe layout (e.g. 3×3 failure domains / nodes); used for documentation ConfigMap only.
  topology: "3x3"
  gpu:
    count: 3
    model: T4
    vendor: nvidia

# Optional ConfigMap with cluster facts (for operators / workbenches that read it).
clusterMetadata:
  enabled: true
  namespace: acs-ai-overwatch-system

# Default StorageClass for all PVCs (Mattermost, Quay, RHACS, Rosey, Tekton, Tempo).
storage:
  defaultStorageClass: gp3-csi

mattermost:
  enabled: true
  namespace: monitoring
  # Init container image to chown PVC data dir for UID 2000 (gp3-csi mounts root-owned).
  initImage: docker.io/library/busybox:1.36
  image:
    repository: mattermost/mattermost-team-edition
    tag: "10.11.15"
  pvc:
    storageClassName: gp3-csi
    size: 10Gi
  # External browser URL and Route host are discovered at runtime into ConfigMap
  # acs-ai-overwatch-cluster-config (mattermostSiteUrl / mattermostRouteHost).
  # Leave empty to use discovered values; set only to override manually.
  siteUrl: ""
  internalUrl: http://mattermost.monitoring.svc.cluster.local:8065
  route:
    host: ""
    tls: true
  # Prepackaged plugins need file storage; disable on PoC until data volume permissions are verified.
  automaticPrepackagedPlugins: true
  # RHACS generic notifier posts {"alert":...}; Mattermost Slack-compatible hooks need {"text":...}.
  # Bridge converts RHACS payloads before forwarding to the incoming webhook.
  webhookBridge:
    enabled: true
    image:
      repository: docker.io/library/python
      tag: "3.12-alpine"
    servicePort: 8080
  bootstrap:
    enabled: true
    jobImage: docker.io/nicolaka/netshoot:v0.13
    teamName: acs
    teamDisplayName: ACS
    adminEmail: mattermost-admin@cluster.local
    adminUsername: mattermost-admin
    adminPassword: redhatpassword123
    hitlEmail: human-in-the-loop@cluster.local
    hitlPassword: redhatpassword123
  # Mattermost 10+ requires PostgreSQL (SQLite removed). Files still use mattermost-data PVC.
  postgres:
    enabled: true
    serviceName: mattermost-postgres
    image:
      repository: docker.io/library/postgres
      tag: "16-alpine"
    database: mattermost
    username: mmuser
    password: mattermost-db-password
    pvc:
      size: 5Gi
      storageClassName: gp3-csi

quayStorage:
  enabled: true
  quayOperator:
    enabled: true
    subscription:
      namespace: openshift-operators
      name: quay-operator
      channel: stable-3.15  # fallback; discovery picks latest stable-3.* from catalog
      installPlanApproval: Automatic
      source: redhat-operators
      sourceNamespace: openshift-marketplace
  quayRegistry:
    enabled: true
    name: quay
    namespace: quay
    clusterMonitoringLabel: "true"
    # Reference Secret for Quay UI superuser credentials (not wired into Quay operator).
    # Use username/password when completing the Quay setup wizard or creating the admin user in the UI.
    adminAccount:
      enabled: true
      secretName: admin-account
      username: quayadmin
      password: CHANGE_ME_QUAY_ADMIN_PASSWORD
      email: quay-admin@cluster.local
    # Quay config bundle for unmanaged object storage (MinIO on gp3-csi).
    configBundleSecret:
      name: quay-config-bundle
    minio:
      enabled: true
      name: quay-minio
      image: quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
      mcImage: quay.io/minio/mc:RELEASE.2024-11-21T17-21-54Z
      bucketName: quay
      volumeSize: 500Gi
      storageClassName: gp3-csi
      credentialsSecret:
        name: quay-minio-credentials
        accessKey: quay-minio-access
        secretKey: CHANGE_ME_MINIO_SECRET
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: "2"
          memory: 2Gi
      bucketJob:
        backoffLimit: 6
        waitImage: docker.io/library/busybox:1.36
    components:
      postgres:
        storageClassName: gp3-csi
        volumeSize: 50Gi
      clairpostgres:
        storageClassName: gp3-csi
        volumeSize: 50Gi
      objectstorage:
        # managed: false — EBS-only clusters lack objectbucket.io (ODF/NooBaa). Use MinIO below.
        managed: false
      horizontalpodautoscaler:
        managed: false
      mirror:
        managed: false
  registryCredentials:
    enabled: true
    namespace: ai-workbenches
    pullSecret:
      name: quay-registry-credentials
    envSecret:
      name: quay-registry-env
    # server is derived from cluster.appsDomain when empty (quay-quay.apps.<domain>).
    server: ""
    username: ai-workbench-pull
    password: CHANGE_ME_PASSWORD
    useExistingDockerconfig: false
    existingDockerconfig: ""

# Node Feature Discovery + NVIDIA GPU Operator (time-slicing). Requires Certified Operators + Red Hat Operators catalogs.
accelerators:
  enabled: true
  nfd:
    enabled: true
    namespace: openshift-nfd
    clusterMonitoringLabel: "true"
    operatorGroup:
      name: openshift-nfd
    subscription:
      name: nfd
      channel: stable
      installPlanApproval: Automatic
      source: redhat-operators
      sourceNamespace: openshift-marketplace
  gpuOperator:
    enabled: true
    namespace: nvidia-gpu-operator
    clusterMonitoringLabel: "true"
    operatorGroup:
      name: nvidia-gpu-operator
    subscription:
      name: gpu-operator-certified
      channel: stable
      installPlanApproval: Automatic
      source: certified-operators
      sourceNamespace: openshift-marketplace
  timeSlicing:
    # ConfigMap consumed by ClusterPolicy devicePlugin.config
    configMapName: time-slicing-config
    configKey: any
    # Each physical L4 advertises N logical `nvidia.com/gpu` devices (scheduling units).
    # 3 GPUs × replicasPerGpu = total slices (set to 6 for six half-GPU slices).
    replicasPerGpu: 2
    migStrategy: none
  clusterPolicy:
    name: gpu-cluster-policy
    operator:
      defaultRuntime: crio
      use_ocp_driver_toolkit: true
    driver:
      enabled: true
    toolkit:
      enabled: true
    devicePlugin:
      enabled: true
    dcgm:
      enabled: true
    gfd:
      enabled: true
    dcgmExporter:
      enabled: true
    nodeStatusExporter:
      enabled: true
    migManager:
      enabled: false
    daemonsets:
      updateStrategy: RollingUpdate
      rollingUpdate:
        maxUnavailable: "1"

# Red Hat OpenShift AI (RHOAI) 3.4 — operator, DataScienceCluster v2, HardwareProfile.
# Requires a NEW cluster with no prior 2.25 install (no supported in-place 2.25→3.4 upgrade).
# Discovery picks stable-3.4 / fast-3.4 / eus-3.4 from catalog (RHOAI_TARGET_VERSION, default 3.4).
rhoai:
  enabled: true
  targetVersion: "3.4"
  operator:
    namespace: redhat-ods-operator
    clusterMonitoringLabel: "true"
    operatorGroup:
      name: redhat-ods-operator
    subscription:
      name: rhods-operator
      channel: stable-3.4
      installPlanApproval: Automatic
      source: redhat-operators
      sourceNamespace: openshift-marketplace
  datascienceCluster:
    name: default-dsc
    apiVersion: datasciencecluster.opendatahub.io/v2
    components:
      dashboard:
        managementState: Managed
      kserve:
        managementState: Managed
      kueue:
        # OpenShift AI 3.4: Managed rejected by webhook; requires manual Red Hat Kueue Operator (README).
        managementState: Unmanaged
        defaultClusterQueueName: default
        defaultLocalQueueName: default
      workbenches:
        managementState: Managed
        workbenchNamespace: rhods-notebooks
      ray:
        managementState: Removed
      feastoperator:
        managementState: Removed
      modelregistry:
        managementState: Removed
        registriesNamespace: rhoai-model-registries
      trainingoperator:
        managementState: Removed
      trustyai:
        managementState: Removed
      llamastackoperator:
        managementState: Removed
      aipipelines:
        managementState: Removed
        argoWorkflowsControllers:
          managementState: Removed
  hardwareProfile:
    enabled: true
    apiVersion: infrastructure.opendatahub.io/v1alpha1
    namespace: redhat-ods-applications
    name: l4-timeslice-half-gpu
    displayName: "L4 time-slice (0.5 GPU increment)"
    # Must match a Kueue LocalQueue that exists for scheduled workloads (see rhoai.datascienceCluster kueue).
    kueueLocalQueueName: default
    identifiers:
      cpu:
        displayName: CPU
        identifier: cpu
        resourceType: CPU
        minCount: 1
        maxCount: "32"
        defaultCount: "4"
      memory:
        displayName: Memory
        identifier: memory
        resourceType: Memory
        minCount: 4Gi
        maxCount: 64Gi
        defaultCount: 8Gi
      gpu:
        displayName: "NVIDIA GPU (time-sliced)"
        identifier: nvidia.com/gpu
        resourceType: Accelerator
        # One scheduling unit = half of an L4 when replicasPerGpu is 2 (see accelerators.timeSlicing).
        minCount: "0.5"
        maxCount: "6"
        defaultCount: "0.5"

# Future Git-backed manifests (enable when content exists).
components:
  bootstrapOperators:
    enabled: false
  gpuConfig:
    enabled: false
  acsPolicies:
    enabled: true
  kagenti:
    enabled: true
  agentsHelpfulHank:
    enabled: true
  agentsRoseyRogue:
    enabled: false
  agentsRoseyRegrets:
    enabled: false
  agentsSneakySam:
    enabled: false
  slmVllm:
    enabled: false
  agentsHelpfulHankSlm:
    enabled: false
  agentsRoseyRegretsSlm:
    enabled: false
  agentsSneakySamSlm:
    enabled: false
  pipelines:
    enabled: false

# Require Kagenti agents in test-range to carry acs-ai-overwatch.io/telemetry=enabled.
# Non-compliant deploys: RHACS DEPLOY policy notifies Mattermost (Phase 3+); NetworkPolicy isolates if a pod still runs.
agentTelemetryPolicy:
  enabled: true
  requiredLabel:
    key: acs-ai-overwatch.io/telemetry
    compliantValue: enabled
    nonCompliantValue: disabled
  networkPolicy:
    enabled: true
    name: agent-telemetry-block-noncompliant
  rhacs:
    enabled: true
    configMapName: acs-policy-agent-telemetry
    name: test-range-agent-telemetry-required
    severity: HIGH_SEVERITY
    # DEPLOY only — alert (and optionally block) when a non-compliant agent Deployment is applied.
    # Does not use SCALE_TO_ZERO (no runtime scale-down notifications).
    lifecycleStages:
      - DEPLOY
    # Block non-compliant agent Deployments at admission when SecuredCluster admissionControl is on.
    # RHACS still fires the policy notifier on the violation (Mattermost → Town Square).
    enforcementActions:
      - FAIL_DEPLOYMENT_CREATE_ENFORCEMENT
      - FAIL_DEPLOYMENT_UPDATE_ENFORCEMENT

# OPT-IN: Phase 5 agent OTEL instrumentation (requires acs-ai-overwatch-observability Application).
# When enabled, agent Deployments read the shared collector endpoint from ConfigMap
# acs-ai-overwatch-observability-config (written by the observability bootstrap Job).
observability:
  agentInstrumentation:
    enabled: false
  integrationConfigMap:
    namespace: acs-ai-overwatch-system
    name: acs-ai-overwatch-observability-config

# PVC for rosey-regrets agent output (enable with components.agentsRoseyRegrets).
agentsRoseyRegrets:
  namespace: test-range
  pvc:
    name: agent-reference-information
    storageClassName: gp3-csi
    size: 20Gi

agentsRoseyRegretsSlm:
  namespace: test-range
  pvc:
    name: agent-reference-information-slm
    storageClassName: gp3-csi
    size: 20Gi

# Shared inference + SLM agent variants (opt-in via components.*Slm).
# backend: standalone (vLLM Deployment + HuggingFace model) or rhoai (KServe ModelCar).
slm:
  backend: standalone
  vllm:
    name: qwen3-vllm
    image: registry.redhat.io/rhaii/vllm-cuda-rhel9@sha256:ad06abf3bb5235ebb5b2df84cd1b9fd09e823f0ff2eebfc82bb4590275ccfe0b
    imagePullPolicy: IfNotPresent
    model: Qwen/Qwen3-0.6B
    servedModelName: qwen3-0-6b
    maxModelLen: 4096
    gpuMemoryUtilization: 0.85
    gpuCount: 1
    servicePort: 8000
    vllmUseV1: false
    enforceEager: true
    nodeSelector: {}
    tolerations: []
  rhoai:
    inferenceServiceName: qwen3-0-6b
    # Optional KServe path when a ModelCar exists; Qwen3-0.6B uses hf:// via standalone vLLM.
    modelUri: hf://Qwen/Qwen3-0.6B
    servedModelName: qwen3-0-6b
    vllmCudaImage: registry.redhat.io/rhaii/vllm-cuda-rhel9@sha256:ad06abf3bb5235ebb5b2df84cd1b9fd09e823f0ff2eebfc82bb4590275ccfe0b
    maxModelLen: 4096
    gpuMemoryUtilization: 0.85
    gpuCount: 1
    servicePort: 8080
    vllmUseV1: false
    enforceEager: true
  rosey:
    autoNetworkAudit: false

# Tekton/OpenShift Pipelines defaults (see pipelines/tekton/agents-build-pipeline.yaml).
pipelines:
  namespace: acs-ai-overwatch-system
  imageRegistry:
    # Internal Quay registry service DNS (adjust to match your QuayRegistry route/service).
    host: quay-quay-app.quay.svc.cluster.local:80
    organization: acs-agents

# Kagenti workloads + source registration for Hank and Rosey.
kagenti:
  namespace: test-range
  # Kagenti operator injects authbridge-proxy on :8000 and moves the agent to :8001.
  # Target the agent port so Services stay reachable when SPIRE/authbridge is unhealthy.
  agentServiceTargetPort: 8001
  # kagenti-adk auto-registration target (defaults to in-cluster Kagenti backend).
  platformUrl: ""
  api:
    # External base URL for Kagenti API; derived from cluster.appsDomain when empty.
    baseUrl: ""
  appSource:
    name: acs-ai-overwatch-gitops
    # Set in values-cluster.yaml by discover-cluster-values.sh (git remote).
    repoUrl: ""
    revision: main
    path: gitops/helm/acs-ai-overwatch
  images:
    helpfulHank: quay-quay-app.quay.svc.cluster.local:80/acs-agents/helpful-hank:latest
    roseyRegrets: quay-quay-app.quay.svc.cluster.local:80/acs-agents/rosey-regrets:latest
    sneakySam: quay-quay-app.quay.svc.cluster.local:80/acs-agents/sneaky-sam:latest
    helpfulHankSlm: quay-quay-app.quay.svc.cluster.local:80/acs-agents/helpful-hank-slm:latest
    roseyRegretsSlm: quay-quay-app.quay.svc.cluster.local:80/acs-agents/rosey-regrets-slm:latest
    sneakySamSlm: quay-quay-app.quay.svc.cluster.local:80/acs-agents/sneaky-sam-slm:latest
  serviceAccountName: openshell
  rosey:
    networkAuditCommand: "Network Audit"
    outputMountPath: /agent-reference-information
    # /24 keeps nmap fast enough for Kagenti; override to 10.0.0.0/8 only in isolated long-run labs.
    networkAuditCidr: "10.0.0.0/24"
    networkAuditTimeoutSec: "45"
    # Let the LLM call run_network_recon (OpenAI tool) instead of hardcoded auto-nmap in server.py.
    autoNetworkAudit: false
    llmDrivenNetworkAudit: true

# ACS (RHACS) policy/operator settings for test-range.
acs:
  testRange:
    namespace: test-range
  operator:
    namespace: rhacs-operator
    operatorGroupName: rhacs-operator
    subscription:
      name: rhacs-operator
      channel: stable
      source: redhat-operators
      sourceNamespace: openshift-marketplace
      installPlanApproval: Automatic
  # OPT-IN: Full RHACS Central + SecuredCluster + bootstrap Job (init bundle, policy import,
  # Mattermost notifier). Default false so the baseline PoC (operator + policy ConfigMap only)
  # keeps working even if Central/SCS install fails. See README "Phase 3 — Full RHACS".
  central:
    enabled: false
    namespace: stackrox
    name: stackrox-central-services
    declarativeNotifier:
      configMapName: rhacs-mattermost-notifier
      configMapKey: mattermost-notifier.yaml
    route:
      enabled: true
    persistence:
      claimName: stackrox-db
      storageClassName: gp3-csi
    egress:
      connectivityPolicy: Online
    scanner:
      autoScaling: Enabled
      maxReplicas: 5
      minReplicas: 2
      replicas: 3
      component: Enabled
  securedCluster:
    name: stackrox-secured-cluster-services
    clusterName: local-cluster
    centralEndpoint: central.stackrox.svc:443
  bootstrap:
    enabled: false
    # Policies are SecurityPolicy CRs (GitOps). Bootstrap only configures SecuredCluster + Mattermost notifier.
    importPolicy: false
    mattermostIntegrationConfigMap: mattermost-acs-integration
    job:
      image: registry.redhat.io/openshift4/ose-cli:latest
      # rhacs-main-rhel8 includes /stackrox/roxctl; standalone roxctl-rhel8 often lacks pull entitlement on sandbox clusters.
      roxctlImage: registry.redhat.io/advanced-cluster-security/rhacs-main-rhel8:4.10.3
      roxctlPath: /stackrox/roxctl
      backoffLimit: 6
  policy:
    configMapName: acs-policy-test-range-runtime-guardrails
    name: test-range-runtime-guardrails
    notifierName: Mattermost Notifier
    severity: HIGH_SEVERITY
    # Alert only — post suspicious runtime activity to Mattermost; do not kill/scale pods (Rosey nmap demo).
    enforcementActions: []
    standardPorts:
      - "80"
      - "443"
      - "6443"
      - "8080"
    processWhitelist:
      - bash
      - sh
      - python
      - python3
      - uv
      - node
      - openssl
      - curl
      - wget
      - git
      - ip
      - ping
      - traceroute
    disallowedProcesses:
      - nmap
      - masscan
