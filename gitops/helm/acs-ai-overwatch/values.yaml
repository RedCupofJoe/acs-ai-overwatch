# Cluster-specific configuration — override via Argo CD, CI, or:
#   helm upgrade -i acs-ai-overwatch . -f values-prod.yaml -n openshift-gitops

global:
  partOf: acs-ai-overwatch

cluster:
  name: acs-ai-overwatch
  # Describe layout (e.g. 3×3 failure domains / nodes); used for documentation ConfigMap only.
  topology: "3x3"
  gpu:
    count: 3
    model: L4
    vendor: nvidia

# Optional ConfigMap with cluster facts (for operators / workbenches that read it).
clusterMetadata:
  enabled: true
  namespace: acs-ai-overwatch-system

mattermost:
  enabled: true
  namespace: monitoring
  image:
    repository: mattermost/mattermost-team-edition
    tag: "10.11.15"
  pvc:
    storageClassName: ""
    size: 10Gi
  siteUrl: https://mattermost-monitoring.apps.CHANGE_ME.example.com
  internalUrl: http://mattermost.monitoring.svc.cluster.local:8065
  route:
    host: ""
    tls: true
  bootstrap:
    enabled: true
    jobImage: docker.io/nicolaka/netshoot:v0.13
    adminEmail: mattermost-admin@cluster.local
    adminUsername: mattermost-admin
    adminPassword: CHANGE_ME_ADMIN
    hitlEmail: human-in-the-loop@cluster.local
    hitlPassword: CHANGE_ME_HITL

quayStorage:
  enabled: true
  localStorageOperator:
    enabled: true
    namespace: openshift-local-storage
    clusterMonitoringLabel: "true"
    podSecurityEnforce: privileged
    operatorGroup:
      name: openshift-local-storage
    subscription:
      name: local-storage-operator
      channel: stable
      installPlanApproval: Automatic
      source: redhat-operators
      sourceNamespace: openshift-marketplace
  localVolume:
    enabled: true
    name: quay-local-storage
    namespace: openshift-local-storage
    logLevel: Normal
    managementState: Managed
    nodeSelector:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/worker
              operator: Exists
    storageClassDevices:
      - storageClassName: quay-local-xfs
        volumeMode: Filesystem
        fsType: xfs
        devicePaths:
          - /dev/disk/by-id/nvme-REPLACE_METADATA_DISK
      - storageClassName: quay-local-block
        volumeMode: Block
        devicePaths:
          - /dev/disk/by-id/nvme-REPLACE_OBJECT_DISK
  quayOperator:
    enabled: true
    subscription:
      namespace: openshift-operators
      name: quay-operator
      channel: stable-3.15
      installPlanApproval: Automatic
      source: redhat-operators
      sourceNamespace: openshift-marketplace
  quayRegistry:
    enabled: true
    name: quay
    namespace: quay
    clusterMonitoringLabel: "true"
    components:
      postgres:
        storageClassName: quay-local-xfs
        volumeSize: 50Gi
      clairpostgres:
        storageClassName: quay-local-xfs
        volumeSize: 50Gi
      objectstorage:
        storageClassName: quay-local-block
        volumeSize: 500Gi
      horizontalpodautoscaler:
        managed: false
      mirror:
        managed: false
  registryCredentials:
    enabled: true
    namespace: ai-workbenches
    pullSecret:
      name: quay-registry-credentials
    envSecret:
      name: quay-registry-env
    server: quay-quay.apps.CHANGE_ME.example.com
    username: ai-workbench-pull
    password: CHANGE_ME_PASSWORD
    useExistingDockerconfig: false
    existingDockerconfig: ""

# Node Feature Discovery + NVIDIA GPU Operator (time-slicing). Requires Certified Operators + Red Hat Operators catalogs.
accelerators:
  enabled: true
  nfd:
    enabled: true
    namespace: openshift-nfd
    clusterMonitoringLabel: "true"
    operatorGroup:
      name: openshift-nfd
    subscription:
      name: nfd
      channel: stable
      installPlanApproval: Automatic
      source: redhat-operators
      sourceNamespace: openshift-marketplace
  gpuOperator:
    enabled: true
    namespace: nvidia-gpu-operator
    clusterMonitoringLabel: "true"
    operatorGroup:
      name: nvidia-gpu-operator
    subscription:
      name: gpu-operator-certified
      channel: stable
      installPlanApproval: Automatic
      source: certified-operators
      sourceNamespace: openshift-marketplace
  timeSlicing:
    # ConfigMap consumed by ClusterPolicy devicePlugin.config
    configMapName: time-slicing-config
    configKey: any
    # Each physical L4 advertises N logical `nvidia.com/gpu` devices (scheduling units).
    # 3 GPUs × replicasPerGpu = total slices (set to 6 for six half-GPU slices).
    replicasPerGpu: 2
    migStrategy: none
  clusterPolicy:
    name: gpu-cluster-policy

# Red Hat OpenShift AI operator + DataScienceCluster + HardwareProfile (3.2 / stable channel — verify on cluster).
rhoai:
  enabled: true
  operator:
    namespace: redhat-ods-operator
    clusterMonitoringLabel: "true"
    operatorGroup:
      name: redhat-ods-operator
    subscription:
      name: rhods-operator
      channel: stable
      installPlanApproval: Automatic
      source: redhat-operators
      sourceNamespace: openshift-marketplace
  datascienceCluster:
    name: default-dsc
    # Dashboard, CodeFlare, KServe Managed; others Removed for a minimal footprint (edit as needed).
    components:
      dashboard:
        managementState: Managed
      codeflare:
        managementState: Managed
      kserve:
        managementState: Managed
      kueue:
        managementState: Managed
        defaultClusterQueueName: default
        defaultLocalQueueName: default
      workbenches:
        managementState: Removed
        workbenchNamespace: rhods-notebooks
      ray:
        managementState: Removed
      feastoperator:
        managementState: Removed
      modelregistry:
        managementState: Removed
        registriesNamespace: rhoai-model-registries
      trainingoperator:
        managementState: Removed
      trustyai:
        managementState: Removed
      llamastackoperator:
        managementState: Removed
      aipipelines:
        managementState: Removed
        argoWorkflowsControllers:
          managementState: Removed
  hardwareProfile:
    enabled: true
    apiVersion: infrastructure.opendatahub.io/v1alpha1
    namespace: redhat-ods-applications
    name: l4-timeslice-half-gpu
    displayName: "L4 time-slice (0.5 GPU increment)"
    # Must match a Kueue LocalQueue that exists for scheduled workloads (see rhoai.datascienceCluster kueue).
    kueueLocalQueueName: default
    identifiers:
      cpu:
        displayName: CPU
        identifier: cpu
        resourceType: CPU
        minCount: 1
        maxCount: "32"
        defaultCount: "4"
      memory:
        displayName: Memory
        identifier: memory
        resourceType: Memory
        minCount: 4Gi
        maxCount: 64Gi
        defaultCount: 8Gi
      gpu:
        displayName: "NVIDIA GPU (time-sliced)"
        identifier: nvidia.com/gpu
        resourceType: Accelerator
        # One scheduling unit = half of an L4 when replicasPerGpu is 2 (see accelerators.timeSlicing).
        minCount: "0.5"
        maxCount: "6"
        defaultCount: "0.5"

# Future Git-backed manifests (enable when content exists).
components:
  bootstrapOperators:
    enabled: false
  gpuConfig:
    enabled: false
  acsPolicies:
    enabled: false
  kagenti:
    enabled: false
  agentsHelpfulHank:
    enabled: false
  agentsRoseyRogue:
    enabled: false
  agentsRoseyRegrets:
    enabled: false
  pipelines:
    enabled: false

# PVC for rosey-regrets agent output (enable with components.agentsRoseyRegrets).
agentsRoseyRegrets:
  namespace: test-range
  pvc:
    storageClassName: ""
    size: 20Gi

# Tekton/OpenShift Pipelines defaults (see pipelines/tekton/agents-build-pipeline.yaml).
pipelines:
  namespace: acs-ai-overwatch-system
  imageRegistry:
    # Internal Quay registry service DNS (adjust to match your QuayRegistry route/service).
    host: quay-quay-registry.quay.svc.cluster.local:443
    organization: acs-agents

# Kagenti workloads + source registration for Hank and Rosey.
kagenti:
  namespace: test-range
  api:
    # External base URL for Kagenti API used by scripts/trigger-network-audit.sh.
    baseUrl: https://kagenti-api.apps.CHANGE_ME.example.com
  appSource:
    name: acs-ai-overwatch-gitops
    repoUrl: https://github.com/CHANGE_ME/acs-ai-overwatch.git
    revision: main
    path: gitops/helm/acs-ai-overwatch
  images:
    helpfulHank: quay-quay-registry.quay.svc.cluster.local:443/acs-agents/helpful-hank:latest
    roseyRegrets: quay-quay-registry.quay.svc.cluster.local:443/acs-agents/rosey-regrets:latest
  serviceAccountName: openshell
  rosey:
    networkAuditCommand: "Network Audit"
    outputMountPath: /mnt/data

# ACS (RHACS) policy/operator settings for test-range.
acs:
  testRange:
    namespace: test-range
  operator:
    namespace: rhacs-operator
    operatorGroupName: rhacs-operator
    subscription:
      name: rhacs-operator
      channel: stable
      source: redhat-operators
      sourceNamespace: openshift-marketplace
      installPlanApproval: Automatic
  policy:
    name: test-range-runtime-guardrails
    notifierName: Mattermost Notifier
    severity: HIGH_SEVERITY
    standardPorts:
      - "80"
      - "443"
      - "6443"
      - "8080"
    processWhitelist:
      - bash
      - sh
      - python
      - python3
      - uv
      - node
      - openssl
      - curl
      - wget
      - git
      - ip
      - ping
      - traceroute
    disallowedProcesses:
      - nmap
      - masscan
