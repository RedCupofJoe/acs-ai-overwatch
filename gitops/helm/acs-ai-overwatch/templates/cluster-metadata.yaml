{{- if and .Values.clusterMetadata.enabled (include "acs-ai-overwatch.createNamespaces" .) }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.clusterMetadata.namespace }}
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "namespace") | nindent 2 }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
---
{{- end }}
{{- if .Values.clusterMetadata.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-metadata
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "configMaps") | nindent 2 }}
  namespace: {{ .Values.clusterMetadata.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
data:
  CLUSTER_NAME: {{ include "acs-ai-overwatch.clusterName" . | quote }}
  CLUSTER_TOPOLOGY: {{ .Values.cluster.topology | quote }}
  GPU_COUNT: {{ .Values.cluster.gpu.count | toString | quote }}
  GPU_MODEL: {{ .Values.cluster.gpu.model | quote }}
  GPU_VENDOR: {{ .Values.cluster.gpu.vendor | quote }}
{{- end }}
