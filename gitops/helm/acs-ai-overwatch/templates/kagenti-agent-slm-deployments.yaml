{{- if and .Values.components.kagenti.enabled .Values.components.agentsHelpfulHankSlm.enabled (include "acs-ai-overwatch.clusterConfigReady" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helpful-hank-slm
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "agents") | nindent 2 }}
  namespace: {{ .Values.kagenti.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: kagenti-agent
    app.kubernetes.io/name: helpful-hank-slm
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    {{- include "acs-ai-overwatch.agentTelemetryLabel" (dict "root" . "compliant" true) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: helpful-hank-slm
      kagenti.io/type: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helpful-hank-slm
        app.kubernetes.io/component: kagenti-agent
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
        {{- include "acs-ai-overwatch.agentTelemetryLabel" (dict "root" . "compliant" true) | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.kagenti.serviceAccountName }}
      containers:
        - name: helpful-hank-slm
          image: {{ .Values.kagenti.images.helpfulHankSlm }}
          imagePullPolicy: Always
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: OPENSHELL_SYSTEM_PROMPT_FILE
              value: /etc/openshell/agent/system_prompt.txt
            - name: PORT
              value: "8000"
            {{- include "acs-ai-overwatch.kagentiAgentPlatformEnv" . | nindent 12 }}
            {{- include "acs-ai-overwatch.slmAgentLlmEnv" . | nindent 12 }}
            {{- include "acs-ai-overwatch.otelAgentEnv" (dict "root" . "serviceName" "helpful-hank-slm") | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: helpful-hank-slm
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "agents") | nindent 2 }}
  namespace: {{ .Values.kagenti.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: kagenti-agent
    app.kubernetes.io/name: helpful-hank-slm
    kagenti.io/type: agent
spec:
  selector:
    app.kubernetes.io/name: helpful-hank-slm
    kagenti.io/type: agent
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.kagenti.agentServiceTargetPort | default 8001 }}
{{- end }}
---
{{- if and .Values.components.kagenti.enabled .Values.components.agentsRoseyRegretsSlm.enabled (include "acs-ai-overwatch.clusterConfigReady" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rosey-regrets-slm
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "agents") | nindent 2 }}
  namespace: {{ .Values.kagenti.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: kagenti-agent
    app.kubernetes.io/name: rosey-regrets-slm
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    {{- include "acs-ai-overwatch.agentTelemetryLabel" (dict "root" . "compliant" true) | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rosey-regrets-slm
      kagenti.io/type: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rosey-regrets-slm
        app.kubernetes.io/component: kagenti-agent
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
        {{- include "acs-ai-overwatch.agentTelemetryLabel" (dict "root" . "compliant" true) | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.kagenti.serviceAccountName }}
      containers:
        - name: rosey-regrets-slm
          image: {{ .Values.kagenti.images.roseyRegretsSlm }}
          imagePullPolicy: Always
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: OPENSHELL_SYSTEM_PROMPT_FILE
              value: /etc/openshell/agent/system_prompt.txt
            - name: PORT
              value: "8000"
            {{- include "acs-ai-overwatch.roseyNetworkAuditEnv" . | nindent 12 }}
            {{- include "acs-ai-overwatch.kagentiAgentPlatformEnv" . | nindent 12 }}
            {{- include "acs-ai-overwatch.slmAgentLlmEnv" . | nindent 12 }}
            {{- include "acs-ai-overwatch.otelAgentEnv" (dict "root" . "serviceName" "rosey-regrets-slm") | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: reference-information
              mountPath: {{ .Values.kagenti.rosey.outputMountPath | quote }}
      volumes:
        - name: reference-information
          persistentVolumeClaim:
            claimName: {{ .Values.agentsRoseyRegretsSlm.pvc.name }}
---
apiVersion: v1
kind: Service
metadata:
  name: rosey-regrets-slm
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "agents") | nindent 2 }}
  namespace: {{ .Values.kagenti.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: kagenti-agent
    app.kubernetes.io/name: rosey-regrets-slm
    kagenti.io/type: agent
spec:
  selector:
    app.kubernetes.io/name: rosey-regrets-slm
    kagenti.io/type: agent
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.kagenti.agentServiceTargetPort | default 8001 }}
{{- end }}
