{{- if and .Values.components.kagenti.enabled .Values.components.agentsHelpfulHank.enabled (include "acs-ai-overwatch.clusterConfigReady" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helpful-hank
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "agents") | nindent 2 }}
  namespace: {{ .Values.kagenti.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: kagenti-agent
    app.kubernetes.io/name: helpful-hank
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    {{- include "acs-ai-overwatch.agentTelemetryLabel" (dict "root" . "compliant" true) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: helpful-hank
      kagenti.io/type: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helpful-hank
        app.kubernetes.io/component: kagenti-agent
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
        {{- include "acs-ai-overwatch.agentTelemetryLabel" (dict "root" . "compliant" true) | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.kagenti.serviceAccountName }}
      containers:
        - name: helpful-hank
          image: {{ .Values.kagenti.images.helpfulHank }}
          imagePullPolicy: Always
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: OPENSHELL_SYSTEM_PROMPT_FILE
              value: /etc/openshell/agent/system_prompt.txt
            - name: PORT
              value: "8000"
            {{- include "acs-ai-overwatch.otelAgentEnv" (dict "root" . "serviceName" "helpful-hank") | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: helpful-hank
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "agents") | nindent 2 }}
  namespace: {{ .Values.kagenti.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: kagenti-agent
    app.kubernetes.io/name: helpful-hank
    kagenti.io/type: agent
spec:
  selector:
    app.kubernetes.io/name: helpful-hank
    kagenti.io/type: agent
  ports:
    - name: http
      port: 80
      targetPort: 8000
{{- end }}
---
{{- if and .Values.components.kagenti.enabled .Values.components.agentsRoseyRegrets.enabled (include "acs-ai-overwatch.clusterConfigReady" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rosey-regrets
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "agents") | nindent 2 }}
  namespace: {{ .Values.kagenti.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: kagenti-agent
    app.kubernetes.io/name: rosey-regrets
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    {{- include "acs-ai-overwatch.agentTelemetryLabel" (dict "root" . "compliant" true) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rosey-regrets
      kagenti.io/type: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rosey-regrets
        app.kubernetes.io/component: kagenti-agent
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
        {{- include "acs-ai-overwatch.agentTelemetryLabel" (dict "root" . "compliant" true) | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.kagenti.serviceAccountName }}
      containers:
        - name: rosey-regrets
          image: {{ .Values.kagenti.images.roseyRegrets }}
          imagePullPolicy: Always
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: OPENSHELL_SYSTEM_PROMPT_FILE
              value: /etc/openshell/agent/system_prompt.txt
            - name: PORT
              value: "8000"
            - name: AGENT_ENABLE_NETWORK_AUDIT
              value: "true"
            - name: AGENT_OUTPUT_DIR
              value: {{ .Values.kagenti.rosey.outputMountPath | quote }}
            - name: NETWORK_AUDIT_COMMAND
              value: {{ .Values.kagenti.rosey.networkAuditCommand | quote }}
            {{- include "acs-ai-overwatch.otelAgentEnv" (dict "root" . "serviceName" "rosey-regrets") | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: reference-information
              mountPath: {{ .Values.kagenti.rosey.outputMountPath | quote }}
      volumes:
        - name: reference-information
          persistentVolumeClaim:
            claimName: {{ .Values.agentsRoseyRegrets.pvc.name }}
---
apiVersion: v1
kind: Service
metadata:
  name: rosey-regrets
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "agents") | nindent 2 }}
  namespace: {{ .Values.kagenti.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: kagenti-agent
    app.kubernetes.io/name: rosey-regrets
    kagenti.io/type: agent
spec:
  selector:
    app.kubernetes.io/name: rosey-regrets
    kagenti.io/type: agent
  ports:
    - name: http
      port: 80
      targetPort: 8000
{{- end }}
