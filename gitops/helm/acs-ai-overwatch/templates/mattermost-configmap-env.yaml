{{- if and .Values.mattermost.enabled (include "acs-ai-overwatch.clusterConfigReady" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: mattermost-env
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "configMaps") | nindent 2 }}
  namespace: {{ .Values.mattermost.namespace }}
  labels:
    app.kubernetes.io/name: mattermost
data:
  MATTERMOST_SITE_URL: {{ include "acs-ai-overwatch.mattermostSiteUrl" . | quote }}
  MATTERMOST_INTERNAL_URL: {{ .Values.mattermost.internalUrl | quote }}
{{- end }}
