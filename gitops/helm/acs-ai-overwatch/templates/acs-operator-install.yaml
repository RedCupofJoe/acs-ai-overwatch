{{- if .Values.components.acsPolicies.enabled }}
{{- if include "acs-ai-overwatch.createNamespaces" . }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.acs.operator.namespace }}
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "namespace") | nindent 2 }}
  labels:
    openshift.io/cluster-monitoring: "true"
---
{{- end }}
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: {{ .Values.acs.operator.operatorGroupName }}
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "operators") | nindent 2 }}
  namespace: {{ .Values.acs.operator.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
spec: {}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: {{ .Values.acs.operator.subscription.name }}
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "operators") | nindent 2 }}
  namespace: {{ .Values.acs.operator.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
spec:
  channel: {{ .Values.acs.operator.subscription.channel }}
  installPlanApproval: {{ .Values.acs.operator.subscription.installPlanApproval }}
  name: rhacs-operator
  source: {{ .Values.acs.operator.subscription.source }}
  sourceNamespace: {{ .Values.acs.operator.subscription.sourceNamespace }}
{{- end }}
