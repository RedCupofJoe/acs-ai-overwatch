{{- if and .Values.mattermost.enabled (include "acs-ai-overwatch.clusterConfigReady" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "mattermostWorkloads") | nindent 2 }}
  namespace: {{ .Values.mattermost.namespace }}
  labels:
    app.kubernetes.io/name: mattermost
    app.kubernetes.io/component: server
spec:
  replicas: 1
  progressDeadlineSeconds: 900
  selector:
    matchLabels:
      app.kubernetes.io/name: mattermost
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mattermost
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: mattermost
      securityContext:
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        {{- if .Values.mattermost.postgres.enabled }}
        - name: wait-for-postgres
          image: {{ .Values.mattermost.initImage | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.mattermost.postgres.serviceName }} 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
        {{- end }}
        - name: fix-data-permissions
          image: {{ .Values.mattermost.initImage | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /mattermost/data/files /mattermost/data/plugins
              chown -R 2000:2000 /mattermost/data
              chmod -R u+rwX,g+rwX /mattermost/data
              find /mattermost/data -type d -exec chmod 2775 {} +
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: data
              mountPath: /mattermost/data
      containers:
        - name: mattermost
          image: {{ printf "%s:%s" .Values.mattermost.image.repository .Values.mattermost.image.tag }}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 2000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 8065
          env:
            - name: MM_SQLSETTINGS_DRIVERNAME
              value: postgres
            - name: MM_SQLSETTINGS_DATASOURCE
              valueFrom:
                secretKeyRef:
                  name: mattermost-postgres
                  key: url
            - name: MM_FILESETTINGS_DIRECTORY
              value: /mattermost/data/files
            - name: MM_SERVICESETTINGS_LISTENADDRESS
              value: ":8065"
            - name: MM_SERVICESETTINGS_SITEURL
              valueFrom:
                configMapKeyRef:
                  name: mattermost-env
                  key: MATTERMOST_SITE_URL
            - name: MM_TEAMSETTINGS_ENABLEUSERCREATION
              value: "true"
            - name: MM_TEAMSETTINGS_ENABLEOPENSERVER
              value: "true"
            {{- if not .Values.mattermost.automaticPrepackagedPlugins }}
            - name: MM_PLUGINSETTINGS_AUTOMATICPREPACKAGEDPLUGINS
              value: "false"
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /mattermost/data
          readinessProbe:
            httpGet:
              path: /api/v4/system/ping
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v4/system/ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mattermost-data
{{- end }}
