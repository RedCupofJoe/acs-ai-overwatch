{{- if .Values.components.acsPolicies.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell
  namespace: {{ .Values.acs.testRange.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: openshell-gpu-runtime
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
allowPrivilegedContainer: true
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: true
allowedCapabilities:
  - NET_ADMIN
  - NET_RAW
  - IPC_LOCK
  - SYS_ADMIN
  - SYS_PTRACE
defaultAddCapabilities: []
requiredDropCapabilities:
  - MKNOD
readOnlyRootFilesystem: false
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
seccompProfiles:
  - runtime/default
  - unconfined
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - hostPath
  - persistentVolumeClaim
  - projected
  - secret
users:
  - system:serviceaccount:{{ .Values.acs.testRange.namespace }}:openshell
{{- end }}
