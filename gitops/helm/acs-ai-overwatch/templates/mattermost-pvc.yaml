{{- if .Values.mattermost.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mattermost-data
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "pvcs") | nindent 2 }}
  namespace: {{ .Values.mattermost.namespace }}
  labels:
    app.kubernetes.io/name: mattermost
    app.kubernetes.io/component: server
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.mattermost.pvc.storageClassName }}
  storageClassName: {{ .Values.mattermost.pvc.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.mattermost.pvc.size }}
{{- end }}
