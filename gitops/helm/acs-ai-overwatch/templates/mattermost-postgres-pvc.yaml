{{- if and .Values.mattermost.enabled .Values.mattermost.postgres.enabled (include "acs-ai-overwatch.clusterConfigReady" .) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mattermost-postgres-data
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "mattermostPrep") | nindent 2 }}
  namespace: {{ .Values.mattermost.namespace }}
  labels:
    app.kubernetes.io/name: mattermost
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  {{- $sc := .Values.mattermost.postgres.pvc.storageClassName | default .Values.mattermost.pvc.storageClassName }}
  {{- if $sc }}
  storageClassName: {{ $sc }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.mattermost.postgres.pvc.size }}
{{- end }}
