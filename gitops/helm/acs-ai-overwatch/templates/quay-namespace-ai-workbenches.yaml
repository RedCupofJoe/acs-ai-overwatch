{{- if and .Values.quayStorage.enabled .Values.quayStorage.registryCredentials.enabled (include "acs-ai-overwatch.createNamespaces" .) }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.quayStorage.registryCredentials.namespace }}
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "namespace") | nindent 2 }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
{{- end }}
