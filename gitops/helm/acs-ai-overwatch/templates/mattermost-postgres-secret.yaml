{{- if and .Values.mattermost.enabled .Values.mattermost.postgres.enabled (include "acs-ai-overwatch.clusterConfigReady" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: mattermost-postgres
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "mattermostPrep") | nindent 2 }}
  namespace: {{ .Values.mattermost.namespace }}
  labels:
    app.kubernetes.io/name: mattermost
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  username: {{ .Values.mattermost.postgres.username | quote }}
  password: {{ .Values.mattermost.postgres.password | quote }}
  database: {{ .Values.mattermost.postgres.database | quote }}
  url: {{ include "acs-ai-overwatch.mattermostPostgresDataSource" . | quote }}
{{- end }}
