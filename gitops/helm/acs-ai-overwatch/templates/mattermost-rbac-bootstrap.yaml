{{- if and .Values.mattermost.enabled .Values.mattermost.bootstrap.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mattermost-bootstrap
  namespace: {{ .Values.mattermost.namespace }}
  labels:
    app.kubernetes.io/name: mattermost
    app.kubernetes.io/component: bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mattermost-bootstrap
  namespace: {{ .Values.mattermost.namespace }}
  labels:
    app.kubernetes.io/name: mattermost
    app.kubernetes.io/component: bootstrap
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mattermost-bootstrap
  namespace: {{ .Values.mattermost.namespace }}
  labels:
    app.kubernetes.io/name: mattermost
    app.kubernetes.io/component: bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mattermost-bootstrap
subjects:
  - kind: ServiceAccount
    name: mattermost-bootstrap
    namespace: {{ .Values.mattermost.namespace }}
{{- end }}
