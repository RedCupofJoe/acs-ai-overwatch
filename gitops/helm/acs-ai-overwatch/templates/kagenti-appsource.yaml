{{- if and .Values.components.kagenti.enabled (include "acs-ai-overwatch.clusterConfigReady" .) }}
# AppSource for Kagenti Git-backed app imports.
# If your installed CRD uses a different apiVersion, update this manifest accordingly.
apiVersion: kagenti.io/v1alpha1
kind: AppSource
metadata:
  name: {{ .Values.kagenti.appSource.name }}
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "agents") | nindent 2 }}
  namespace: {{ .Values.kagenti.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: kagenti-source
spec:
  type: git
  git:
    url: {{ include "acs-ai-overwatch.gitRepoUrl" . }}
    revision: {{ .Values.kagenti.appSource.revision }}
    path: {{ .Values.kagenti.appSource.path }}
{{- end }}
