{{- if and .Values.components.acsPolicies.enabled (include "acs-ai-overwatch.crdReady" (dict "root" . "crdName" .Values.platformResources.crds.securityPolicy)) }}
apiVersion: config.stackrox.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ .Values.acs.policy.name }}
  namespace: {{ .Values.acs.central.namespace }}
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "acsPolicies") | nindent 2 }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: acs-policy
spec:
  policyName: {{ .Values.acs.policy.name }}
  description: >
    Alert on suspicious runtime activity in {{ .Values.acs.testRange.namespace }}
    (nmap/masscan). Notifies Mattermost only — workloads keep running for lab demos.
  rationale: >
    Rosey Regrets and other agents may run deliberate recon tooling in test-range;
    operators need visibility without RHACS killing or scaling pods mid-demo.
  remediation: >
    Review the Mattermost alert and scan artifacts on the agent PVC; do not rely on
    automatic enforcement for this policy.
  disabled: false
  severity: {{ .Values.acs.policy.severity }}
  enforcementActions: {{ .Values.acs.policy.enforcementActions | toJson }}
  lifecycleStages:
    - RUNTIME
  categories:
    - Security Best Practices
    - Anomalous Activity
  eventSource: DEPLOYMENT_EVENT
  scope:
    - namespace: {{ .Values.acs.testRange.namespace }}
  policySections:
    - sectionName: Suspicious recon processes detected
      policyGroups:
        - fieldName: Process Name
          booleanOperator: OR
          values:
{{- range .Values.acs.policy.disallowedProcesses }}
            - value: {{ . | quote }}
{{- end }}
  notifiers:
    - {{ .Values.acs.policy.notifierName }}
{{- end }}
