{{- if and .Values.mattermost.enabled .Values.mattermost.bootstrap.enabled (include "acs-ai-overwatch.clusterConfigReady" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: mattermost-bootstrap-script
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "configMaps") | nindent 2 }}
  namespace: {{ .Values.mattermost.namespace }}
  labels:
    app.kubernetes.io/name: mattermost
    app.kubernetes.io/component: bootstrap
data:
  bootstrap.sh: |
{{ include "mattermost.bootstrapScript" . | nindent 4 }}
{{- end }}
