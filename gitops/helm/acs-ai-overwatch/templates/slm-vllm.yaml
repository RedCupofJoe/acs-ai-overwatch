{{- if and .Values.components.kagenti.enabled .Values.components.slmVllm.enabled (eq .Values.slm.backend "standalone") (include "acs-ai-overwatch.clusterConfigReady" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.slm.vllm.name }}
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "agents") | nindent 2 }}
  namespace: {{ .Values.kagenti.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: slm-inference
    app.kubernetes.io/name: {{ .Values.slm.vllm.name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.slm.vllm.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.slm.vllm.name }}
        app.kubernetes.io/component: slm-inference
    spec:
      {{- with .Values.slm.vllm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.slm.vllm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-model-cache
          image: registry.redhat.io/ubi9/ubi-minimal:latest
          command:
            - sh
            - -c
            - mkdir -p /model-cache && chmod 1777 /model-cache
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
      containers:
        - name: vllm
          image: {{ .Values.slm.vllm.image }}
          imagePullPolicy: {{ .Values.slm.vllm.imagePullPolicy }}
          args:
            - --model
            - {{ .Values.slm.vllm.model | quote }}
            - --served-model-name
            - {{ .Values.slm.vllm.servedModelName | quote }}
            - --max-model-len
            - {{ .Values.slm.vllm.maxModelLen | quote }}
            - --trust-remote-code
            - --enforce-eager
            - --gpu-memory-utilization
            - {{ .Values.slm.vllm.gpuMemoryUtilization | quote }}
            - --host
            - "0.0.0.0"
            - --port
            - {{ .Values.slm.vllm.servicePort | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.slm.vllm.servicePort }}
          env:
            - name: HF_HOME
              value: /model-cache
            - name: HUGGINGFACE_HUB_CACHE
              value: /model-cache
            - name: TRANSFORMERS_CACHE
              value: /model-cache
            {{- if not .Values.slm.vllm.vllmUseV1 }}
            - name: VLLM_USE_V1
              value: "0"
            {{- end }}
            - name: HF_HUB_OFFLINE
              value: "0"
            - name: TRANSFORMERS_OFFLINE
              value: "0"
          resources:
            requests:
              nvidia.com/gpu: {{ .Values.slm.vllm.gpuCount | quote }}
            limits:
              nvidia.com/gpu: {{ .Values.slm.vllm.gpuCount | quote }}
          readinessProbe:
            exec:
              command:
                - curl
                - -sf
                - http://127.0.0.1:{{ .Values.slm.vllm.servicePort }}/v1/models
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 15
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - curl
                - -sf
                - http://127.0.0.1:{{ .Values.slm.vllm.servicePort }}/v1/models
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 6
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
      volumes:
        - name: model-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.slm.vllm.name }}
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "agents") | nindent 2 }}
  namespace: {{ .Values.kagenti.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: slm-inference
    app.kubernetes.io/name: {{ .Values.slm.vllm.name }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Values.slm.vllm.name }}
  ports:
    - name: http
      port: {{ .Values.slm.vllm.servicePort }}
      targetPort: http
{{- end }}
