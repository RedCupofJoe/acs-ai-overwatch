{{- if and .Values.quayStorage.enabled .Values.quayStorage.registryCredentials.enabled (include "acs-ai-overwatch.clusterConfigReady" .) }}
{{- $pull := .Values.quayStorage.registryCredentials.pullSecret.name }}
{{- $env := .Values.quayStorage.registryCredentials.envSecret.name }}
{{- $ns := .Values.quayStorage.registryCredentials.namespace }}
{{- $server := include "acs-ai-overwatch.quayRegistryServer" . }}
{{- $user := .Values.quayStorage.registryCredentials.username }}
{{- $pass := .Values.quayStorage.registryCredentials.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pull }}
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "secrets") | nindent 2 }}
  namespace: {{ $ns }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
stringData:
  {{- if .Values.quayStorage.registryCredentials.useExistingDockerconfig }}
  .dockerconfigjson: |
{{ .Values.quayStorage.registryCredentials.existingDockerconfig | nindent 4 }}
  {{- else }}
  {{- $auth := printf "%s:%s" $user $pass | b64enc }}
  {{- $entry := dict "auth" $auth }}
  {{- $auths := dict $server $entry }}
  {{- $doc := dict "auths" $auths }}
  .dockerconfigjson: {{ $doc | toJson | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $env }}
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "secrets") | nindent 2 }}
  namespace: {{ $ns }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  REGISTRY_SERVER: {{ $server | quote }}
  REGISTRY_USERNAME: {{ $user | quote }}
  REGISTRY_PASSWORD: {{ $pass | quote }}
{{- end }}
