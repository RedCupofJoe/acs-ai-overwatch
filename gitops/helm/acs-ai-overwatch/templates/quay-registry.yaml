{{- if and .Values.quayStorage.enabled .Values.quayStorage.quayRegistry.enabled (include "acs-ai-overwatch.crdReady" (dict "root" . "crdName" .Values.platformResources.crds.quayRegistry)) }}
apiVersion: quay.redhat.com/v1
kind: QuayRegistry
metadata:
  name: {{ .Values.quayStorage.quayRegistry.name }}
  {{- include "acs-ai-overwatch.argocdPlatformCrAnnotations" (dict "root" . "wave" "platformCRs") | nindent 2 }}
  namespace: {{ .Values.quayStorage.quayRegistry.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
spec:
  {{- if .Values.quayStorage.quayRegistry.minio.enabled }}
  configBundleSecret: {{ .Values.quayStorage.quayRegistry.configBundleSecret.name }}
  {{- end }}
  components:
    - kind: postgres
      managed: true
      overrides:
        storageClassName: {{ .Values.quayStorage.quayRegistry.components.postgres.storageClassName | default (include "acs-ai-overwatch.storageClassName" .) }}
        volumeSize: {{ .Values.quayStorage.quayRegistry.components.postgres.volumeSize }}
    - kind: clairpostgres
      managed: true
      overrides:
        storageClassName: {{ .Values.quayStorage.quayRegistry.components.clairpostgres.storageClassName | default (include "acs-ai-overwatch.storageClassName" .) }}
        volumeSize: {{ .Values.quayStorage.quayRegistry.components.clairpostgres.volumeSize }}
    - kind: objectstorage
      managed: {{ .Values.quayStorage.quayRegistry.components.objectstorage.managed }}
    - kind: quay
      managed: true
    - kind: clair
      managed: true
    - kind: redis
      managed: true
    - kind: horizontalpodautoscaler
      managed: {{ .Values.quayStorage.quayRegistry.components.horizontalpodautoscaler.managed }}
    - kind: mirror
      managed: {{ .Values.quayStorage.quayRegistry.components.mirror.managed }}
    - kind: monitoring
      managed: true
    - kind: tls
      managed: true
    - kind: route
      managed: true
{{- end }}
