{{- if and .Values.quayStorage.enabled .Values.quayStorage.quayRegistry.enabled .Values.quayStorage.quayRegistry.adminAccount.enabled }}
{{- $admin := .Values.quayStorage.quayRegistry.adminAccount }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $admin.secretName }}
  {{- include "acs-ai-overwatch.argocdSyncWaveAnnotations" (dict "root" . "wave" "secrets") | nindent 2 }}
  namespace: {{ .Values.quayStorage.quayRegistry.namespace }}
  labels:
    {{- include "acs-ai-overwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: quay-admin-account
type: Opaque
stringData:
  username: {{ $admin.username | quote }}
  password: {{ $admin.password | quote }}
  email: {{ $admin.email | quote }}
{{- end }}
