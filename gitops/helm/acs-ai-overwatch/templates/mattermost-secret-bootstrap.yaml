{{- if and .Values.mattermost.enabled .Values.mattermost.bootstrap.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: mattermost-bootstrap
  namespace: {{ .Values.mattermost.namespace }}
  labels:
    app.kubernetes.io/name: mattermost
type: Opaque
stringData:
  admin-email: {{ .Values.mattermost.bootstrap.adminEmail | quote }}
  admin-username: {{ .Values.mattermost.bootstrap.adminUsername | quote }}
  admin-password: {{ .Values.mattermost.bootstrap.adminPassword | quote }}
  hitl-email: {{ .Values.mattermost.bootstrap.hitlEmail | quote }}
  hitl-password: {{ .Values.mattermost.bootstrap.hitlPassword | quote }}
{{- end }}
