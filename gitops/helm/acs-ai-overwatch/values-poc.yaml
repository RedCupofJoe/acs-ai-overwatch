# PoC cluster overlay — merge after values.yaml (see gitops/argocd/application.yaml).
#
# Profile: AWS workers without spare NVMe/instance-store disks (ROSA / EBS-only).
# Uses default CSI storage for Mattermost; defers Quay + Local Storage Operator until
# dedicated volumes are attached (see README "PoC Cluster-Local Storage").
#
# Confirm StorageClass name on cluster:
#   oc get storageclass

# Helm lookup on the GitOps repo-server often cannot see CRDs; operators are up on this cluster.
platformResources:
  waitForCrds: false

# No raw local disks — skip LSO / LocalVolume / QuayRegistry from GitOps on this profile.
quayStorage:
  enabled: false

mattermost:
  automaticPrepackagedPlugins: false
  pvc:
    # Default on many AWS/OpenShift clusters; change if `oc get storageclass` differs.
    storageClassName: gp3-csi

storage:
  local:
    filesystemStorageClass: gp3-csi
    blockStorageClass: gp3-csi

# Agent images in values.yaml point at in-cluster Quay; disable until Quay is deployed.
components:
  kagenti:
    enabled: false
  agentsHelpfulHank:
    enabled: false

acs:
  central:
    enabled: false
    persistence:
      storageClassName: gp3-csi
  bootstrap:
    enabled: false

# PoC does not schedule RHOAI workbench workloads — skip Kueue operator prerequisite.
rhoai:
  datascienceCluster:
    components:
      kueue:
        managementState: Removed
  hardwareProfile:
    enabled: false

