# PoC cluster overlay — merged after values.yaml (see gitops/argocd/application.yaml).
#
# All PVCs use gp3-csi from values.yaml. Override storage.defaultStorageClass here
# if `oc get storageclass` shows a different name.

platformResources:
  waitForCrds: false

# Disable Quay until you are ready to build/push agent images (uses gp3-csi when enabled).
quayStorage:
  enabled: true

mattermost:
  automaticPrepackagedPlugins: false

components:
  kagenti:
    enabled: false
  agentsHelpfulHank:
    enabled: false

acs:
  central:
    enabled: true
  bootstrap:
    enabled: true

rhoai:
  datascienceCluster:
    components:
      kueue:
        managementState: Removed
  hardwareProfile:
    enabled: false
