# Apply into the OpenShift GitOps control plane namespace (default: openshift-gitops).
# Requires OpenShift GitOps Operator (Argo CD). Sync deploys the umbrella Helm chart at gitops/helm/acs-ai-overwatch.
# Resource apply order uses argocd.argoproj.io/sync-wave annotations from the chart (see values.yaml argocd.syncWaves).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: acs-ai-overwatch
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: acs-ai-overwatch
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: acs-ai-overwatch
  source:
    repoURL: https://github.com/RedCupofJoe/acs-ai-overwatch.git
    targetRevision: main
    path: gitops/helm/acs-ai-overwatch
    helm:
      valueFiles:
        - values.yaml
        - values-poc.yaml
        - values-cluster.yaml
      # Mattermost URL and cluster.appsDomain come from in-cluster ConfigMap
      # acs-ai-overwatch-cluster-config (written by acs-ai-overwatch-cluster-discovery).
      # serverDryRun lets Helm lookup read that ConfigMap at render time.
      serverDryRun: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=false
      # Operators (wave 10) must install CRDs before platform CRs (wave 30). Allow sync to
      # complete when CRDs are not registered yet; re-sync after CSVs become Ready.
      - SkipDryRunOnMissingResource=true
