# Apply into the OpenShift GitOps control plane namespace (default: openshift-gitops).
# Requires OpenShift GitOps Operator (Argo CD). Sync deploys the umbrella Helm chart at gitops/helm/acs-ai-overwatch.
# Resource apply order uses argocd.argoproj.io/sync-wave annotations from the chart (see values.yaml argocd.syncWaves).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: acs-ai-overwatch
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: acs-ai-overwatch
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/RedCupofJoe/acs-ai-overwatch.git
    targetRevision: main
    path: gitops/helm/acs-ai-overwatch
    helm:
      valueFiles:
        - values.yaml
        - values-poc.yaml
        # Optional local override (make cluster-values). GitOps uses in-cluster ConfigMap from
        # Application acs-ai-overwatch-cluster-discovery when cluster.appsDomain is empty.
        - values-cluster.yaml
      ignoreMissingValueFiles: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=false
