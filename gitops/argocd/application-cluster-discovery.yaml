# Sync this Application before (or with) acs-ai-overwatch. The discovery Job writes
# ConfigMap acs-ai-overwatch-system/acs-ai-overwatch-cluster-config for the main chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: acs-ai-overwatch-cluster-discovery
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: acs-ai-overwatch
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: acs-ai-overwatch
  source:
    repoURL: https://github.com/RedCupofJoe/acs-ai-overwatch.git
    targetRevision: main
    path: gitops/helm/acs-ai-overwatch-cluster-discovery
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    # Target namespace for chart resources (also created by the chart).
    namespace: acs-ai-overwatch-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
